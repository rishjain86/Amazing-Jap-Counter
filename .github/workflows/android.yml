name: Build Final Release APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Dependencies
      run: npm install

    - name: Setup Capacitor Android
      run: |
        npm install @capacitor/android
        cp assets/splash.png www/splash.png || true
        cp assets/Splash.png www/splash.png || true
        npx cap add android
        npx cap sync android

    - name: Generate App Icons and Splash Screens
      run: |
        npm install -g @capacitor/assets
        npx @capacitor/assets generate --android

    - name: Add AdMob App ID to Manifest
      run: |
        sed -i '/<\/application>/i \        <meta-data android:name="com.google.android.gms.ads.APPLICATION_ID" android:value="ca-app-pub-6519206650027176~3432580794"/>' android/app/src/main/AndroidManifest.xml

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Build Android Release APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleRelease

    - name: Generate Keystore & Sign APK
      run: |
        # 1. Generate a secure Keystore automatically
        keytool -genkey -v -keystore release-key.keystore -alias my_alias -keyalg RSA -keysize 2048 -validity 10000 -storepass password123 -keypass password123 -dname "CN=Amazing Jap,O=Omni,C=IN"
        
        # 2. Find the correct apksigner version and sign the APK
        BUILD_TOOLS_VERSION=$(ls $ANDROID_HOME/build-tools | tail -1)
        $ANDROID_HOME/build-tools/$BUILD_TOOLS_VERSION/apksigner sign --ks release-key.keystore --ks-pass pass:password123 --key-pass pass:password123 --out android/app/build/outputs/apk/release/Amazing-Jap-Counter-Release.apk android/app/build/outputs/apk/release/app-release-unsigned.apk

    - name: Upload Signed Release APK
      uses: actions/upload-artifact@v4
      with:
        name: Amazing-Jap-Counter-Final-APK
        path: android/app/build/outputs/apk/release/Amazing-Jap-Counter-Release.apk
